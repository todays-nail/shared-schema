name: Apply Shared Staging

on:
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
      - 'supabase/functions/**'
      - 'scripts/check-migration-names.sh'
      - 'scripts/prepare-shared-deploy.sh'
      - 'scripts/deploy-functions.sh'
      - 'scripts/deploy-and-validate-functions.sh'
      - 'scripts/functions-check-deployed.sh'
      - 'scripts/functions-check-auth-config.sh'
      - '.github/workflows/apply-shared-staging.yml'
  workflow_dispatch:

concurrency:
  group: supabase-shared-staging
  cancel-in-progress: false

jobs:
  apply-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare shared deploy inputs
        run: bash scripts/prepare-shared-deploy.sh

      - name: Apply to shared-staging
        env:
          SUPABASE_DB_URL_SHARED_STAGING: ${{ secrets.SUPABASE_DB_URL_SHARED_STAGING }}
        run: supabase db push --db-url "$SUPABASE_DB_URL_SHARED_STAGING"

      - name: Detect function changes
        id: function_changes
        run: |
          set -euo pipefail
          changed=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            changed=true
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              if git diff --name-only "$before" "${{ github.sha }}" | grep -q '^supabase/functions/'; then
                changed=true
              fi
            fi
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "function_changes=$changed"

      - name: Deploy and validate edge functions
        if: steps.function_changes.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: bash scripts/deploy-and-validate-functions.sh

      - name: Skip function deploy (no function changes)
        if: steps.function_changes.outputs.changed != 'true'
        run: echo "No supabase/functions changes detected. Skipping function deploy and validation."
